services:
  db:
    image: mysql:8.0
    container_name: newtome-mysql
    environment:
      MYSQL_DATABASE: newtome
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - newtome_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  newtome_mysql_data:
